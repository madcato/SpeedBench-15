name: Build and Publish Pack

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create archive
        run: |
          tar -czf speedbench-15.tar.gz \
            benchlocal.pack.json \
            dist/benchlocal/ \
            dist/lib/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest
          body: |
            Automated release from commit ${{ github.sha }}.

            **Import URL for BenchLocal:**
            ```
            https://github.com/madcato/SpeedBench-15/releases/latest/download/speedbench-15.tar.gz
            ```
          files: speedbench-15.tar.gz
          make_latest: true
          prerelease: false
